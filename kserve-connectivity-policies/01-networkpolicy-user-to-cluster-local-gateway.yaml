# NetworkPolicy: Allow user namespaces to reach cluster-local-gateway
# Location: istio-system namespace
# Fixes: Internal cluster traffic to InferenceServices
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-user-namespaces-to-cluster-local-gateway
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: kubeflow
    app.kubernetes.io/component: kserve-networking
spec:
  podSelector:
    matchLabels:
      app: cluster-local-gateway
      istio: cluster-local-gateway
  ingress:
  # Allow from Kubeflow user profile namespaces
  - from:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/part-of: kubeflow-profile
    ports:
    - protocol: TCP
      port: 8080
  # Allow from namespaces with istio injection (broader)
  - from:
    - namespaceSelector:
        matchLabels:
          istio-injection: enabled
    ports:
    - protocol: TCP
      port: 8080
  # Allow from kubeflow namespace (for pipelines, notebooks, etc.)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kubeflow
    ports:
    - protocol: TCP
      port: 8080
  policyTypes:
  - Ingress
